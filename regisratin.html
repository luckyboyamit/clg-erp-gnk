<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Community | Creative Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --text-dark: #1f2937;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Vibrant animated gradient background */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h2 {
            font-size: 2rem;
            color: var(--text-dark);
            font-weight: 600;
        }

        header p {
            color: #6b7280;
            font-size: 0.9rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
            padding-left: 5px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            outline: none;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        /* Password Strength Meter */
        .strength-meter {
            height: 4px;
            background: #e5e7eb;
            margin-top: 8px;
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
        }

        .btn-register {
            width: 100%;
            background: var(--accent);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .btn-register:hover {
            background: var(--accent-hover);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #6b7280;
        }

        .footer-text a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <header>
            <h2>Create Account</h2>
            <p>Start your journey  GNKIC today.</p>
        </header>

        <form id="regForm">
            <div class="form-grid">
                <div class="input-group">
                    <label>First Name</label>
                    <input type="text" placeholder="John" required>
                </div>
                <div class="input-group">
                    <label>Last Name</label>
                    <input type="text" placeholder="Doe" required>
                </div>
            </div>

            <div class="input-group full-width">
                <label>Email Address</label>
                <input type="email" placeholder="john@example.com" required>
            </div>

            <div class="input-group full-width">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
                <div class="strength-meter">
                    <div id="bar" class="strength-bar"></div>
                </div>
            </div>

            <button type="submit" class="btn-register">Create Account</button>
        </form>

        <p class="footer-text">
            Already have an account? <a href="a.html">Log in</a>
        </p>
    </div>

    <script>
        const passInput = document.getElementById('password');
        const bar = document.getElementById('bar');

        // Real-time Password Strength logic
        passInput.addEventListener('input', () => {
            const val = passInput.value;
            let strength = 0;

            if (val.length > 5) strength += 25;
            if (val.match(/[A-Z]/)) strength += 25;
            if (val.match(/[0-9]/)) strength += 25;
            if (val.match(/[^A-Za-z0-9]/)) strength += 25;

            bar.style.width = strength + "%";
            
            if (strength <= 25) bar.style.backgroundColor = "#ef4444"; // Red
            else if (strength <= 50) bar.style.backgroundColor = "#f59e0b"; // Orange
            else if (strength <= 75) bar.style.backgroundColor = "#3b82f6"; // Blue
            else bar.style.backgroundColor = "#10b981"; // Green
        });

        document.getElementById('regForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Account created successfully! Welcome aboard.");
        });
    </script>
</body>
</html>
