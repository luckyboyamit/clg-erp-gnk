<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <style>
      * {
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.profile-card {
    background: white;
    width: 350px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    overflow: hidden;
    text-align: center;
}

.header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    height: 100px;
}

.photo-container {
    margin-top: -75px;
}

.photo-container img {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 5px solid white;
    object-fit: cover;
}

.content {
    padding: 20px;
}

h1 { margin: 10px 0 5px; font-size: 1.5rem; color: #333; }
.major { color: #777; margin-bottom: 20px; }

.stats {
    display: flex;
    justify-content: space-around;
    padding: 15px 0;
    border-top: 1px solid #eee;
    border-bottom: 1px solid #eee;
}

.skills-section { margin-top: 20px; }

.skills-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-bottom: 15px;
}

.skill-tag {
    background: #eef2ff;
    color: #4f46e5;
    padding: 5px 12px;
    border-radius: 15px;
    font-size: 0.85rem;
    font-weight: bold;
}

.add-skill input {
    padding: 8px;
    border: 1px solid #ddd;
    border-radius: 5px;
    outline: none;
}

.add-skill button {
    padding: 8px 12px;
    background: #764ba2;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="header"></div>
        <div class="content">
            <div class="photo-container">
                <img src="amit.jpeg" alt="Student Photo" id="profile-img">
            </div>
            
            <h1 id="name">Amit</h1>
            <p class="major">Computer Science Undergraduate</p>
            
            <div class="stats">
                <div><strong>GPA</strong><br>3.8</div>
                <div><strong>Year</strong><br>Junior</div>
                <div><strong>ID</strong><br>#88210</div>
            </div>

            <div class="skills-section">
                <h3>Skills</h3>
                <div id="skills-list" class="skills-container">
                    <span class="skill-tag">Python</span>
                    <span class="skill-tag">UI Design</span>
                    <span class="skill-tag">react</span>
                    <span class="skill-tag">next JS</span>
                </div>
                <div class="add-skill">
                    <input type="text" id="skill-input" placeholder="Add a skill...">
                    <button onclick="addSkill()">+</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
